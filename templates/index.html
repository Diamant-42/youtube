<!DOCTYPE html>
<html>
<head>
    <title>YouTube Local</title>
</head>
<body>
    <h1>Bienvenue sur YouTube Local</h1>
    <a href="/upload">Uploader une vidéo</a>
    <ul>
        {% for filename, info in videos %}
        <li>
            <a href="{{ url_for('watch', filename=filename) }}">{{ filename }}</a> -
            Vues: {{ info.views }} - Likes: {{ info.likes }}
        </li>
        {% endfor %}
    </ul>
</body>
</html>
